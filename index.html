@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

body {
  background: #fffeb3;
  font-family: 'Press Start 2P', monospace;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem 3rem;
}

.page {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.header-card {
  width: 100%;
  background: #fb2e01;
  border: 4px solid black;
  box-shadow: 6px 6px 0 black;
  padding: 1.8rem 1.4rem 1.4rem;
  text-align: center;
  margin-bottom: 1.4rem;
  position: relative;
}

.header-card::before {
  content: '';
  position: absolute;
  top: -4px; left: -4px;
  width: 12px; height: 12px;
  background: #fffeb3;
  border-right: 4px solid black;
  border-bottom: 4px solid black;
}
.header-card::after {
  content: '';
  position: absolute;
  top: -4px; right: -4px;
  width: 12px; height: 12px;
  background: #fffeb3;
  border-left: 4px solid black;
  border-bottom: 4px solid black;
}

.avatar-area {
  display: flex;
  justify-content: center;
  margin-bottom: 1.2rem;
}

.avatar-sprite {
  width: 80px;
  height: 80px;
  image-rendering: pixelated;
  display: block;
}

.name {
  font-size: 1rem;
  color: #fffeb3;
  text-shadow: 3px 3px 0 black;
  letter-spacing: 0.04em;
  line-height: 1.7;
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.handle {
  font-size: 0.65rem;
  color: #ffe28a;
  text-shadow: 2px 2px 0 black;
  letter-spacing: 0.06em;
  margin-bottom: 1rem;
}

.bio {
  font-size: 0.52rem;
  color: white;
  line-height: 2.2;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
}

.section-label {
  width: 100%;
  margin-bottom: 0.9rem;
  display: flex;
  gap: 0;
  align-items: flex-end;
}

.px-divider-label {
  font-size: 0.52rem;
  color: #666547;
  background: #fffeb3;
  padding: 5px 10px;
  border: 3px solid black;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  box-shadow: 3px 3px 0 black;
}

.divider-line {
  flex: 1;
  border-bottom: 4px solid black;
  box-shadow: 0 3px 0 black;
  margin-bottom: 4px;
}

.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  margin-bottom: 1.4rem;
}

.link-btn {
  display: flex;
  align-items: center;
  width: 100%;
  background: white;
  border: 4px solid black;
  box-shadow: 5px 5px 0 black;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.08s, box-shadow 0.08s;
}

.link-btn:hover {
  transform: translate(2px, 2px);
  box-shadow: 3px 3px 0 black;
}

.link-btn:active {
  transform: translate(5px, 5px);
  box-shadow: 0 0 0 black;
}

.link-icon-box {
  width: 54px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border-right: 4px solid black;
  font-size: 1.3rem;
}

.bg-red    { background: #fb2e01; }
.bg-green  { background: #6fcb9f; }
.bg-yellow { background: #ffe28a; }
.bg-olive  { background: #666547; }
.bg-cream  { background: #fffeb3; }

.link-text {
  flex: 1;
  padding: 0 0.9rem;
  font-size: 0.55rem;
  color: black;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  line-height: 1.6;
}

.link-arrow {
  width: 40px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-left: 4px solid black;
  font-size: 0.7rem;
  color: black;
  background: #ffe28a;
}

/* ── socials ── */
.socials {
  width: 100%;
  display: flex;
  gap: 0.7rem;
  margin-bottom: 1.4rem;
  justify-content: flex-start;
}

.social-btn {
  width: 54px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 4px solid black;
  box-shadow: 4px 4px 0 black;
  cursor: pointer;
  text-decoration: none;
  color: black;
  font-size: 1.4rem;
  transition: transform 0.08s, box-shadow 0.08s;
}

.social-btn:hover {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 black;
}

.s1 { background: #fb2e01; }
.s2 { background: #6fcb9f; }
.s3 { background: #ffe28a; }

.footer-bar {
  width: 100%;
  background: black;
  border: 4px solid black;
  box-shadow: 5px 5px 0 #666547;
  padding: 0.7rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-txt {
  font-size: 0.48rem;
  color: #6fcb9f;
  letter-spacing: 0.1em;
}

.heart { font-size: 0.8rem; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
.blink { animation: blink 1s step-end infinite; }

.pixel-deco {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-bottom: 0.5rem;
  overflow: hidden;
}

.px-block { width: 13px; height: 13px; border: 2px solid black; flex-shrink: 0; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.header-card      { animation: slideIn 0.3s ease both; }
.link-btn:nth-child(1) { animation: slideIn 0.3s 0.08s ease both; }
.link-btn:nth-child(2) { animation: slideIn 0.3s 0.14s ease both; }
.link-btn:nth-child(3) { animation: slideIn 0.3s 0.20s ease both; }

.socials               { animation: slideIn 0.3s 0.38s ease both; }
.footer-bar            { animation: slideIn 0.3s 0.44s ease both; }
</style>
